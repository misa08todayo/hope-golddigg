<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ギター指板エディター Pro</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .controls { margin: 10px 0; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; width: 95%; }
        .fretboard-container { overflow-x: auto; width: 98%; background: #fff; padding: 40px 10px 20px 10px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #ccc; }
        
        .fretboard {
            display: grid;
            grid-template-rows: repeat(6, 35px); /* 6弦分 */
            border-right: 2px solid #333;
            min-width: 1500px; /* 24フレット分を確保 */
        }

        .string { display: flex; border-bottom: 1px solid #999; position: relative; }
        .string:last-child { border-bottom: none; }

        .fret {
            width: 60px; height: 35px; border-left: 2px solid #333;
            display: flex; align-items: center; justify-content: center;
            position: relative; cursor: pointer;
        }

        /* 0フレット（ナット） */
        .fret:first-child { border-left-width: 10px; width: 50px; background: #f9f9f9; }

        /* フレット番号 */
        .fret-number {
            position: absolute; top: -30px; font-size: 13px; font-weight: bold;
            color: #444; width: 100%; text-align: center;
        }

        /* ポジションマーク用（ドット） */
        .dot-marker {
            position: absolute; bottom: -55px; width: 100%; text-align: center;
            font-size: 18px; color: #bbb; pointer-events: none;
        }

        .note {
            width: 26px; height: 26px; display: flex; align-items: center;
            justify-content: center; font-size: 11px; font-weight: bold;
            z-index: 2; border: 2px solid transparent; box-sizing: border-box;
        }

        /* --- マークの種類 --- */
        .note.type-0 { background: #e74c3c; color: white; border-radius: 50%; } /* 赤丸(Root) */
        .note.type-1 { background: #3498db; color: white; border-radius: 50%; } /* 青丸 */
        .note.type-2 { background: white; color: #333; border: 2px solid #333; border-radius: 50%; } /* 塗りなし丸 */
        .note.type-3 { background: #2ecc71; color: white; border-radius: 4px; }  /* 緑四角 */
        .note.type-4 { 
            background: #f1c40f; color: #333; 
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%); 
            width: 30px; height: 30px; padding-top: 5px;
        } /* 黄三角 */

        button { padding: 8px 15px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; background: #fff; }
        button:hover { background: #eee; }
        .hint { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <h3>🎸 Guitar Fretboard Pro (24 Frets)</h3>

    <div class="controls">
        <button onclick="clearBoard()">全消去</button>
        <div class="hint">クリック：マーク切替 (赤●→青●→白○→緑■→黄▲→消去)<br>右クリック/長押し：文字入力</div>
    </div>

    <div class="fretboard-container">
        <div id="fretboard" class="fretboard"></div>
    </div>

    <script>
        const strings = 6;
        const frets = 25; // 0〜24フレット
        const board = document.getElementById('fretboard');

        function createBoard() {
            for (let s = 0; s < strings; s++) {
                const stringEl = document.createElement('div');
                stringEl.className = 'string';
                
                for (let f = 0; f < frets; f++) {
                    const fretEl = document.createElement('div');
                    fretEl.className = 'fret';
                    
                    // フレット番号とドットマーカー
                    if (s === 0) {
                        const num = document.createElement('div');
                        num.className = 'fret-number';
                        num.innerText = f;
                        fretEl.appendChild(num);

                        // ギターの一般的なドット位置（3,5,7,9,12,15,17,19,21,24）
                        const dots = [3, 5, 7, 9, 12, 15, 17, 19, 21, 24];
                        if (dots.includes(f)) {
                            const dot = document.createElement('div');
                            dot.className = 'dot-marker';
                            dot.innerText = (f === 12 || f === 24) ? "●●" : "●";
                            fretEl.appendChild(dot);
                        }
                    }

                    fretEl.addEventListener('click', () => toggleNote(fretEl));
                    fretEl.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        const note = fretEl.querySelector('.note');
                        if (note) {
                            const label = prompt("度数や指番号を入力:", note.innerText);
                            if (label !== null) note.innerText = label;
                        }
                    });

                    stringEl.appendChild(fretEl);
                }
                board.appendChild(stringEl);
            }
        }

        function toggleNote(fretEl) {
            let note = fretEl.querySelector('.note');
            if (!note) {
                note = document.createElement('div');
                note.className = 'note type-0';
                note.dataset.type = "0";
                fretEl.appendChild(note);
            } else {
                let type = parseInt(note.dataset.type);
                if (type < 4) { // 5種類 (0,1,2,3,4)
                    type++;
                    note.className = `note type-${type}`;
                    note.dataset.type = type;
                    // 三角形(type4)の時だけ位置微調整
                    note.style.paddingTop = (type === 4) ? "5px" : "0";
                } else {
                    note.remove();
                }
            }
        }

        function clearBoard() {
            if (confirm("すべて消去しますか？")) {
                document.querySelectorAll('.note').forEach(n => n.remove());
            }
        }

        createBoard();
    </script>
</body>
</html>
