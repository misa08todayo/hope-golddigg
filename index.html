<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ギター指板エディター Pro (Final)</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .controls { margin: 10px 0; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; width: 95%; max-width: 600px; z-index: 20; }
        
        .fretboard-wrapper {
            display: flex; /* サイドフレットと指板を並べる */
            align-items: flex-start;
            overflow-x: auto; /* 横スクロール全体をカバー */
            width: 98%;
            position: relative;
        }

        /* --- サイドのフレット番号（New） --- */
        .side-fret-numbers {
            display: flex; flex-direction: column;
            width: 30px; /* 横幅 */
            margin-top: 50px; /* 指板の上部空白に合わせる */
            font-size: 11px; font-weight: bold; color: #777;
            user-select: none;
        }
        .side-fret { height: 35px; /* 弦の高さに合わせる */ display: flex; align-items: center; justify-content: center; }

        .fretboard-container { 
            background: #fdfdfd; padding: 50px 0 30px 0; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #ccc; position: relative;
            flex-grow: 1; /* 残りの幅をすべて使用 */
        }
        
        .fretboard {
            display: grid;
            grid-template-rows: repeat(6, 35px); /* 6弦分 */
            min-width: 1540px; /* 24フレット分。1フレット=約62pxで計算 */
            position: relative;
        }

        .string { display: flex; border-bottom: 1px solid #999; position: relative; }
        .string:last-child { border-bottom: none; }

        .fret {
            /* 最後のフレットが潰れないよう、min-widthを指定。 */
            min-width: 62px; height: 35px; border-left: 2px solid #333;
            display: flex; align-items: center; justify-content: center;
            position: relative; cursor: pointer;
            box-sizing: border-box; /* 枠線を含めて幅計算 */
        }

        /* 最後のフレット(24F)にも右側の線を引く */
        .fret:last-child { border-right: 2px solid #333; }

        /* 0フレット（ナット） */
        .fret:first-child { border-left-width: 12px; min-width: 50px; background: #eee; }

        /* --- 上部のフレット番号 --- */
        .fret-number {
            position: absolute; top: -35px; font-size: 14px; font-weight: bold;
            color: #333; width: 100%; text-align: center; left: 0;
            user-select: none;
        }

        /* --- ポジションマーク（中央配置） --- */
        .dot-marker-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            pointer-events: none; z-index: 1; /* マークの上に配置 */
        }
        .dot-marker {
            width: 14px; height: 14px; background: #d0d0d0; border-radius: 50%;
            margin: 2px 0; /* ダブルドット時の間隔 */
        }

        /* --- 演奏マーク（種類） --- */
        .note {
            width: 28px; height: 28px; display: flex; align-items: center;
            justify-content: center; font-size: 12px; font-weight: bold;
            z-index: 10; border: 2px solid transparent; box-sizing: border-box;
            position: relative; /* 中央配置の微調整用 */
        }

        /* --- マークの見た目 --- */
        .note.type-0 { background: #e74c3c; color: white; border-radius: 50%; } /* 赤丸 */
        .note.type-1 { background: #3498db; color: white; border-radius: 50%; } /* 青丸 */
        .note.type-2 { background: white; color: #333; border: 2px solid #333; border-radius: 50%; } /* 塗りなし丸 */
        .note.type-3 { background: #2ecc71; color: white; border-radius: 4px; }  /* 緑四角 */
        .note.type-4 { 
            background: #f1c40f; color: #333; 
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%); 
            width: 32px; height: 32px; padding-top: 6px;
        } /* 黄三角 */

        button { padding: 8px 15px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; background: #fff; font-size: 14px; }
        button:hover { background: #eee; }
        .hint { font-size: 12px; color: #666; margin-top: 5px; line-height: 1.4; }
    </style>
</head>
<body>

    <h3>🎸 Guitar Fretboard Pro (Final)</h3>

    <div class="controls">
        <button onclick="clearBoard()">全消去</button>
        <div class="hint">クリック：マーク切替<br>(赤●→青●→白○→緑■→黄▲→消去)<br>右クリック/長押し：文字入力</div>
    </div>

    <div class="fretboard-wrapper">
        <div id="side-fret-numbers" class="side-fret-numbers"></div>

        <div class="fretboard-container">
            <div id="fretboard" class="fretboard"></div>
        </div>
    </div>

    <script>
        const strings = 6;
        const frets = 25; // 0〜24フレット
        const board = document.getElementById('fretboard');
        const sideFretsBoard = document.getElementById('side-fret-numbers');

        function createBoard() {
            // サイドのフレット数を生成（0F〜24F）
            for (let f = 0; f < frets; f++) {
                const sideFret = document.createElement('div');
                sideFret.className = 'side-fret';
                // 0フレット(ナット)は表示を調整
                if(f === 0) {
                    sideFret.innerText = "Nut";
                    sideFret.style.fontSize = "9px";
                } else {
                    sideFret.innerText = `${f}F`;
                }
                sideFretsBoard.appendChild(sideFret);
            }

            // フレットごとの処理（上部フレット番号とポジションマーク）
            for (let f = 0; f < frets; f++) {
                
                // 上部のフレット番号
                const num = document.createElement('div');
                num.className = 'fret-number';
                num.innerText = f;
                if(f === 0) num.style.opacity = "0"; // 0Fは非表示

                // ポジションマークの追加
                const dots = [3, 5, 7, 9, 12, 15, 17, 19, 21, 24];
                if (dots.includes(f)) {
                    const container = document.createElement('div');
                    container.className = 'dot-marker-container';
                    
                    // 正確な位置計算：ナット(50px) + フレット幅(62px)*(f-1) + フレット幅/2
                    const fretWidth = 62;
                    const nutWidth = 50;
                    let leftPos = nutWidth + fretWidth * (f - 1) + fretWidth / 2;
                    if(f === 0) leftPos = nutWidth / 2; // 理論上はここだが、f=0はdotsに含まれない
                    
                    container.style.left = `${leftPos}px`;

                    const dot1 = document.createElement('div');
                    dot1.className = 'dot-marker';
                    container.appendChild(dot1);

                    // 12Fと24Fはダブルドット
                    if (f === 12 || f === 24) {
                        const dot2 = document.createElement('div');
                        dot2.className = 'dot-marker';
                        container.appendChild(dot2);
                    }
                    // ポジションマークは指板全体に対して配置
                    board.appendChild(container);
                    // フレット番号もここに
                    container.appendChild(num);
                }
            }

            // 弦ごとの処理
            for (let s = 0; s < strings; s++) {
                const stringEl = document.createElement('div');
                stringEl.className = 'string';
                
                for (let f = 0; f < frets; f++) {
                    const fretEl = document.createElement('div');
                    fretEl.className = 'fret';
                    
                    fretEl.addEventListener('click', () => toggleNote(fretEl));
                    fretEl.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        const note = fretEl.querySelector('.note');
                        if (note) {
                            const label = prompt("度数や指番号を入力:", note.innerText);
                            if (label !== null) note.innerText = label;
                        }
                    });

                    stringEl.appendChild(fretEl);
                }
                board.appendChild(stringEl);
            }
        }

        function toggleNote(fretEl) {
            let note = fretEl.querySelector('.note');
            if (!note) {
                note = document.createElement('div');
                note.className = 'note type-0';
                note.dataset.type = "0";
                fretEl.appendChild(note);
            } else {
                let type = parseInt(note.dataset.type);
                if (type < 4) { // 5種類
                    type++;
                    note.className = `note type-${type}`;
                    note.dataset.type = type;
                    note.style.paddingTop = (type === 4) ? "6px" : "0";
                } else {
                    note.remove();
                }
            }
        }

        function clearBoard() {
            if (confirm("すべて消去しますか？")) {
                document.querySelectorAll('.note').forEach(n => n.remove());
            }
        }

        createBoard();
    </script>
</body>
</html>
