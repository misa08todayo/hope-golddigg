<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ギター指板お絵描きツール</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .fretboard-container { overflow-x: auto; max-width: 100%; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .fretboard {
            display: grid;
            grid-template-rows: repeat(6, 30px);
            border-right: 2px solid #333;
            position: relative;
            margin-top: 20px;
        }

        .string {
            display: flex;
            border-bottom: 1px solid #999;
            position: relative;
        }

        .fret {
            width: 60px;
            height: 30px;
            border-left: 3px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            user-select: none;
        }

        /* ナット（0フレット） */
        .fret:first-child { border-left-width: 8px; width: 40px; }

        .note {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            z-index: 2;
            transition: transform 0.1s;
        }

        /* 記号の種類 */
        .note.type-0 { background: #e74c3c; border-radius: 50%; } /* Root - Circle */
        .note.type-1 { background: #3498db; border-radius: 4px; }  /* Square */
        .note.type-2 { 
            background: #2ecc71; 
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%); 
            width: 28px; height: 28px; padding-top: 4px;
        } /* Triangle */

        .fret-number {
            position: absolute;
            top: -25px;
            font-size: 12px;
            color: #666;
            width: 100%;
            text-align: center;
        }

        .legend { margin-top: 20px; font-size: 14px; color: #555; }
    </style>
</head>
<body>

    <h2>🎸 Guitar Fretboard Painter</h2>

    <div class="controls">
        <button onclick="clearBoard()">全消去</button>
        <span> | クリック：マーク作成/形状変更 | 右クリック：文字入れ</span>
    </div>

    <div class="fretboard-container">
        <div id="fretboard" class="fretboard"></div>
    </div>

    <div class="legend">
        ●: ルート(R) / ■: 完全度数 / ▲: 3度・7度など
    </div>

    <script>
        const strings = 6;
        const frets = 15;
        const board = document.getElementById('fretboard');

        // 指板の生成
        function createBoard() {
            board.style.gridTemplateRows = `repeat(${strings}, 35px)`;
            for (let s = 0; s < strings; s++) {
                const stringEl = document.createElement('div');
                stringEl.className = 'string';
                
                for (let f = 0; f < frets; f++) {
                    const fretEl = document.createElement('div');
                    fretEl.className = 'fret';
                    
                    // フレット番号表示
                    if (s === 0) {
                        const num = document.createElement('div');
                        num.className = 'fret-number';
                        num.innerText = f;
                        fretEl.appendChild(num);
                    }

                    // 左クリックイベント
                    fretEl.addEventListener('click', (e) => {
                        toggleNote(fretEl);
                    });

                    // 右クリックイベント（度数入力）
                    fretEl.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        const note = fretEl.querySelector('.note');
                        if (note) {
                            const label = prompt("度数や指番号を入力 (例: R, 3, m7):", note.innerText);
                            if (label !== null) note.innerText = label;
                        }
                    });

                    stringEl.appendChild(fretEl);
                }
                board.appendChild(stringEl);
            }
        }

        function toggleNote(fretEl) {
            let note = fretEl.querySelector('.note');
            if (!note) {
                // 新規作成
                note = document.createElement('div');
                note.className = 'note type-0';
                note.dataset.type = "0";
                fretEl.appendChild(note);
            } else {
                // 形状変更
                let type = parseInt(note.dataset.type);
                if (type < 2) {
                    type++;
                    note.className = `note type-${type}`;
                    note.dataset.type = type;
                } else {
                    // 削除
                    note.remove();
                }
            }
        }

        function clearBoard() {
            if (confirm("すべてのマークを消去しますか？")) {
                document.querySelectorAll('.note').forEach(n => n.remove());
            }
        }

        createBoard();
    </script>
</body>
</html>
