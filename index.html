<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ギター指板エディター Pro (Final Fix)</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .controls { margin: 10px 0; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; width: 95%; max-width: 600px; z-index: 100; }
        
        .fretboard-wrapper {
            display: flex; 
            overflow-x: auto; 
            width: 98%;
            background: #fff;
            padding: 40px 10px 20px 10px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* --- サイドのフレット番号 --- */
        .side-fret-numbers {
            display: flex; flex-direction: column;
            width: 40px; min-width: 40px;
            font-size: 11px; font-weight: bold; color: #777;
            padding-top: 1px; /* 弦の高さ微調整 */
        }
        .side-fret { height: 35px; display: flex; align-items: center; justify-content: flex-end; padding-right: 5px; }

        .fretboard {
            display: grid;
            grid-template-rows: repeat(6, 35px); 
            min-width: 1540px;
            position: relative;
            border-right: 2px solid #333;
        }

        .string { display: flex; border-bottom: 1px solid #999; position: relative; }
        .string:last-child { border-bottom: none; }

        .fret {
            min-width: 62px; height: 35px; border-left: 2px solid #333;
            display: flex; align-items: center; justify-content: center;
            position: relative; cursor: pointer;
            box-sizing: border-box;
        }

        .fret:first-child { border-left-width: 10px; min-width: 50px; background: #eee; }

        /* --- ポジションマーク（弦と弦の間に配置） --- */
        .dot {
            position: absolute; width: 14px; height: 14px; background: #dcdcdc; border-radius: 50%;
            pointer-events: none; z-index: 1; transform: translateY(17.5px); /* 弦の真ん中に移動 */
        }

        /* --- 上部のフレット番号 --- */
        .fret-number {
            position: absolute; top: -30px; font-size: 14px; font-weight: bold;
            color: #333; width: 100%; text-align: center;
        }

        .note {
            width: 28px; height: 28px; display: flex; align-items: center;
            justify-content: center; font-size: 12px; font-weight: bold;
            z-index: 10; border: 2px solid transparent; box-sizing: border-box;
        }

        /* マークの見た目 */
        .note.type-0 { background: #e74c3c; color: white; border-radius: 50%; }
        .note.type-1 { background: #3498db; color: white; border-radius: 50%; }
        .note.type-2 { background: white; color: #333; border: 2px solid #333; border-radius: 50%; }
        .note.type-3 { background: #2ecc71; color: white; border-radius: 4px; }
        .note.type-4 { background: #f1c40f; color: #333; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); width: 32px; height: 32px; padding-top: 6px; }

        button { padding: 8px 15px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; background: #fff; }
        .hint { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <h3>🎸 Guitar Fretboard Pro</h3>

    <div class="controls">
        <button onclick="clearBoard()">全消去</button>
        <div class="hint">クリック：マーク切替 / 右クリック：文字入力</div>
    </div>

    <div class="fretboard-wrapper">
        <div id="side-frets" class="side-fret-numbers"></div>
        <div id="fretboard" class="fretboard"></div>
    </div>

    <script>
        const strings = 6;
        const frets = 25; 
        const board = document.getElementById('fretboard');
        const sideFrets = document.getElementById('side-frets');

        // サイドフレット番号
        for (let s = 0; s < strings; s++) {
            const div = document.createElement('div');
            div.className = 'side-fret';
            div.innerText = `${6 - s}弦`;
            sideFrets.appendChild(div);
        }

        function createBoard() {
            for (let s = 0; s < strings; s++) {
                const stringEl = document.createElement('div');
                stringEl.className = 'string';
                
                for (let f = 0; f < frets; f++) {
                    const fretEl = document.createElement('div');
                    fretEl.className = 'fret';
                    
                    // 上部のフレット番号（1弦の時だけ表示）
                    if (s === 0 && f > 0) {
                        const num = document.createElement('div');
                        num.className = 'fret-number';
                        num.innerText = f;
                        fretEl.appendChild(num);
                    }

                    // ポジションマーク（特定のフレット・弦の間に配置）
                    const dotFrets = [3, 5, 7, 9, 15, 17, 19, 21];
                    // 通常のドット（3弦と4弦の間）
                    if (s === 2 && dotFrets.includes(f)) {
                        const dot = document.createElement('div');
                        dot.className = 'dot';
                        fretEl.appendChild(dot);
                    }
                    // 12Fと24Fのダブルドット（2弦と3弦の間 ＆ 4弦と5弦の間）
                    if ((f === 12 || f === 24) && (s === 1 || s === 3)) {
                        const dot = document.createElement('div');
                        dot.className = 'dot';
                        fretEl.appendChild(dot);
                    }

                    fretEl.addEventListener('click', () => toggleNote(fretEl));
                    fretEl.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        const note = fretEl.querySelector('.note');
                        if (note) {
                            const label = prompt("文字入力:", note.innerText);
                            if (label !== null) note.innerText = label;
                        }
                    });

                    stringEl.appendChild(fretEl);
                }
                board.appendChild(stringEl);
            }
        }

        function toggleNote(fretEl) {
            let note = fretEl.querySelector('.note');
            if (!note) {
                note = document.createElement('div');
                note.className = 'note type-0';
                note.dataset.type = "0";
                fretEl.appendChild(note);
            } else {
                let type = parseInt(note.dataset.type);
                if (type < 4) {
                    type++;
                    note.className = `note type-${type}`;
                    note.dataset.type = type;
                } else {
                    note.remove();
                }
            }
        }

        function clearBoard() {
            if (confirm("すべて消去しますか？")) {
                document.querySelectorAll('.note').forEach(n => n.remove());
            }
        }

        createBoard();
    </script>
</body>
</html>
